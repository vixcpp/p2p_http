name: P2P HTTP Strict CI

on:
  push:
    branches:
      - main
      - master
      - dev
      - release/**
    paths:
      - ".github/workflows/p2p-http-strict-ci.yml"
      - "CMakeLists.txt"
      - "include/**"
      - "src/**"
      - "examples/**"
      - "README.md"
      - "LICENSE"
      - "vix.json"

  pull_request:
    branches:
      - main
      - master
      - dev
      - release/**
    paths:
      - ".github/workflows/p2p-http-strict-ci.yml"
      - "CMakeLists.txt"
      - "include/**"
      - "src/**"
      - "examples/**"
      - "README.md"
      - "LICENSE"
      - "vix.json"

  workflow_dispatch:

permissions:
  contents: read

env:
  BUILD_JOBS: 2
  VIX_GIT_BRANCH: dev

jobs:
  build:
    name: Build P2P HTTP (${{ matrix.compiler }}, middleware=${{ matrix.middleware }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        compiler:
          - gcc
          - clang
        middleware:
          - OFF
          - AUTO

    steps:
      - name: Checkout p2p_http repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            clang \
            g++ \
            pkg-config \
            git \
            curl \
            ca-certificates \
            libasio-dev \
            libssl-dev \
            libsqlite3-dev \
            nlohmann-json3-dev \
            libspdlog-dev \
            libfmt-dev

          test -f /usr/include/asio.hpp || (echo "::error::System Asio header not found"; exit 1)

      - name: Select compiler
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
          else
            echo "CC=gcc" >> "$GITHUB_ENV"
            echo "CXX=g++" >> "$GITHUB_ENV"
          fi

      - name: Fetch sibling dependencies
        run: |
          set -euxo pipefail

          rm -rf \
            ../error \
            ../path \
            ../env \
            ../async \
            ../process \
            ../net \
            ../utils \
            ../json \
            ../template \
            ../core \
            ../p2p \
            ../cache \
            ../middleware

          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/error.git ../error
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/path.git ../path
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/env.git ../env
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" --recurse-submodules https://github.com/vixcpp/async.git ../async
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/process.git ../process
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/net.git ../net
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/utils.git ../utils
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/json.git ../json
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/template.git ../template
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/core.git ../core
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/p2p.git ../p2p
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/cache.git ../cache
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/middleware.git ../middleware

          git -C ../async submodule update --init --recursive --depth 1 || true

      - name: Prepare Asio layouts
        run: |
          set -euxo pipefail

          mkdir -p ../p2p/third_party/asio/include
          cp -r /usr/include/asio* ../p2p/third_party/asio/include/ || true
          test -f ../p2p/third_party/asio/include/asio.hpp

          mkdir -p ../async/third_party/asio
          rm -rf ../async/third_party/asio/include
          mkdir -p ../async/third_party/asio/include
          cp -r /usr/include/asio* ../async/third_party/asio/include/ || true
          test -f ../async/third_party/asio/include/asio.hpp

      - name: Verify required sibling dependencies
        run: |
          set -euxo pipefail

          test -f ../error/CMakeLists.txt
          test -f ../path/CMakeLists.txt
          test -f ../env/CMakeLists.txt
          test -f ../async/CMakeLists.txt
          test -f ../process/CMakeLists.txt
          test -f ../net/CMakeLists.txt
          test -f ../utils/CMakeLists.txt
          test -f ../json/CMakeLists.txt
          test -f ../template/CMakeLists.txt
          test -f ../core/CMakeLists.txt
          test -f ../p2p/CMakeLists.txt
          test -f ../cache/CMakeLists.txt
          test -f ../middleware/CMakeLists.txt

          test -f ../json/include/vix/json/Simple.hpp
          test -f ../async/third_party/asio/include/asio.hpp
          test -f ../p2p/third_party/asio/include/asio.hpp

      - name: Export dependency include paths
        run: |
          EXTRA_PATHS="$GITHUB_WORKSPACE/../error/include"
          EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../path/include"
          EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../env/include"
          EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../async/include"
          EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../process/include"
          EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../net/include"
          EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../utils/include"
          EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../json/include"
          EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../template/include"
          EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../core/include"
          EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../p2p/include"
          EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../cache/include"
          EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../middleware/include"

          echo "CPATH=$EXTRA_PATHS${CPATH:+:$CPATH}" >> "$GITHUB_ENV"
          echo "CPLUS_INCLUDE_PATH=$EXTRA_PATHS${CPLUS_INCLUDE_PATH:+:$CPLUS_INCLUDE_PATH}" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DVIX_ENABLE_SANITIZERS=OFF \
            -DVIX_P2P_HTTP_FETCH_DEPS=ON \
            -DVIX_P2P_HTTP_WITH_MIDDLEWARE=${{ matrix.middleware }} \
            -DVIX_P2P_HTTP_BUILD_TESTS=OFF \
            -DVIX_P2P_BUILD_TESTS=OFF \
            -DVIX_P2P_FETCH_NET=OFF \
            -DVIX_P2P_FETCH_UTILS=OFF \
            -DVIX_P2P_FETCH_SYNC=OFF \
            -DVIX_P2P_FETCH_CACHE=OFF \
            -DVIX_P2P_WITH_UTILS=AUTO \
            -DVIX_P2P_WITH_SYNC=OFF \
            -DVIX_P2P_WITH_CACHE=OFF \
            -DVIX_P2P_WITH_JSON=OFF \
            -DVIX_P2P_WITH_SSL=OFF \
            -DVIX_NET_BUILD_TESTS=OFF \
            -DVIX_NET_FETCH_ERROR=OFF \
            -DVIX_NET_FETCH_PROCESS=OFF \
            -DVIX_MW_BUILD_TESTS=OFF \
            -DVIX_MW_FETCH_CORE=OFF \
            -DVIX_MW_FETCH_CACHE=OFF \
            -DVIX_MW_FETCH_UTILS=OFF \
            -DVIX_MW_WITH_UTILS=AUTO \
            -DVIX_MW_WITH_JSON=OFF \
            -DVIX_CORE_WITH_OPENSSL=OFF \
            -DVIX_CORE_WITH_TEMPLATE=AUTO \
            -DVIX_CORE_WITH_MYSQL=OFF \
            -DVIX_CORE_WITH_JSON=AUTO

      - name: Build
        run: |
          cmake --build build -j"${BUILD_JOBS}"

      - name: Print artifacts
        run: |
          find build -maxdepth 6 -type f | sort

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout p2p_http repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            clang \
            g++ \
            cppcheck \
            clang-tidy \
            pkg-config \
            git \
            curl \
            ca-certificates \
            libasio-dev \
            libssl-dev \
            libsqlite3-dev \
            nlohmann-json3-dev \
            libspdlog-dev \
            libfmt-dev

      - name: Fetch sibling dependencies
        run: |
          set -euxo pipefail

          rm -rf \
            ../error \
            ../path \
            ../env \
            ../async \
            ../process \
            ../net \
            ../utils \
            ../json \
            ../template \
            ../core \
            ../p2p \
            ../cache \
            ../middleware

          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/error.git ../error
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/path.git ../path
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/env.git ../env
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" --recurse-submodules https://github.com/vixcpp/async.git ../async
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/process.git ../process
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/net.git ../net
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/utils.git ../utils
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/json.git ../json
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/template.git ../template
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/core.git ../core
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/p2p.git ../p2p
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/cache.git ../cache
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/middleware.git ../middleware

      - name: Prepare Asio layouts
        run: |
          set -euxo pipefail

          mkdir -p ../p2p/third_party/asio/include
          cp -r /usr/include/asio* ../p2p/third_party/asio/include/ || true
          test -f ../p2p/third_party/asio/include/asio.hpp

          mkdir -p ../async/third_party/asio
          rm -rf ../async/third_party/asio/include
          mkdir -p ../async/third_party/asio/include
          cp -r /usr/include/asio* ../async/third_party/asio/include/ || true
          test -f ../async/third_party/asio/include/asio.hpp

      - name: Configure for analysis
        run: |
          cmake -S . -B build-analyze -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DVIX_ENABLE_SANITIZERS=OFF \
            -DVIX_P2P_HTTP_FETCH_DEPS=ON \
            -DVIX_P2P_HTTP_WITH_MIDDLEWARE=OFF \
            -DVIX_P2P_HTTP_BUILD_TESTS=OFF \
            -DVIX_P2P_BUILD_TESTS=OFF \
            -DVIX_P2P_FETCH_NET=OFF \
            -DVIX_P2P_FETCH_UTILS=OFF \
            -DVIX_P2P_FETCH_SYNC=OFF \
            -DVIX_P2P_FETCH_CACHE=OFF \
            -DVIX_P2P_WITH_UTILS=AUTO \
            -DVIX_P2P_WITH_SYNC=OFF \
            -DVIX_P2P_WITH_CACHE=OFF \
            -DVIX_P2P_WITH_JSON=OFF \
            -DVIX_P2P_WITH_SSL=OFF \
            -DVIX_NET_BUILD_TESTS=OFF \
            -DVIX_NET_FETCH_ERROR=OFF \
            -DVIX_NET_FETCH_PROCESS=OFF \
            -DVIX_CORE_WITH_OPENSSL=OFF \
            -DVIX_CORE_WITH_TEMPLATE=AUTO \
            -DVIX_CORE_WITH_MYSQL=OFF \
            -DVIX_CORE_WITH_JSON=AUTO

      - name: Run clang-tidy
        run: |
          set +e
          find src -name '*.cpp' -print0 | xargs -0 -r -n1 -P2 clang-tidy -p build-analyze
          exit 0

      - name: Run cppcheck
        run: |
          set +e
          cppcheck \
            --enable=all \
            --std=c++20 \
            --inconclusive \
            --quiet \
            --suppress=missingIncludeSystem \
            include/ src/
          exit 0

  install-check:
    name: Install P2P HTTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout p2p_http repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            g++ \
            pkg-config \
            git \
            curl \
            ca-certificates \
            libasio-dev \
            libssl-dev \
            libsqlite3-dev \
            nlohmann-json3-dev \
            libspdlog-dev \
            libfmt-dev

      - name: Fetch sibling dependencies
        run: |
          set -euxo pipefail

          rm -rf \
            ../error \
            ../path \
            ../env \
            ../async \
            ../process \
            ../net \
            ../utils \
            ../json \
            ../template \
            ../core \
            ../p2p \
            ../cache \
            ../middleware

          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/error.git ../error
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/path.git ../path
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/env.git ../env
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" --recurse-submodules https://github.com/vixcpp/async.git ../async
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/process.git ../process
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/net.git ../net
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/utils.git ../utils
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/json.git ../json
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/template.git ../template
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/core.git ../core
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/p2p.git ../p2p
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/cache.git ../cache
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/middleware.git ../middleware

      - name: Prepare Asio layouts
        run: |
          set -euxo pipefail

          mkdir -p ../p2p/third_party/asio/include
          cp -r /usr/include/asio* ../p2p/third_party/asio/include/ || true
          test -f ../p2p/third_party/asio/include/asio.hpp

          mkdir -p ../async/third_party/asio
          rm -rf ../async/third_party/asio/include
          mkdir -p ../async/third_party/asio/include
          cp -r /usr/include/asio* ../async/third_party/asio/include/ || true
          test -f ../async/third_party/asio/include/asio.hpp

      - name: Configure installable build
        run: |
          cmake -S . -B build-install -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DVIX_P2P_HTTP_FETCH_DEPS=ON \
            -DVIX_P2P_HTTP_WITH_MIDDLEWARE=OFF \
            -DVIX_P2P_HTTP_BUILD_TESTS=OFF \
            -DVIX_P2P_BUILD_TESTS=OFF \
            -DVIX_P2P_FETCH_NET=OFF \
            -DVIX_P2P_FETCH_UTILS=OFF \
            -DVIX_P2P_FETCH_SYNC=OFF \
            -DVIX_P2P_FETCH_CACHE=OFF \
            -DVIX_P2P_WITH_UTILS=AUTO \
            -DVIX_P2P_WITH_SYNC=OFF \
            -DVIX_P2P_WITH_CACHE=OFF \
            -DVIX_P2P_WITH_JSON=OFF \
            -DVIX_P2P_WITH_SSL=OFF \
            -DVIX_NET_BUILD_TESTS=OFF \
            -DVIX_NET_FETCH_ERROR=OFF \
            -DVIX_NET_FETCH_PROCESS=OFF \
            -DVIX_CORE_WITH_OPENSSL=OFF \
            -DVIX_CORE_WITH_TEMPLATE=AUTO \
            -DVIX_CORE_WITH_MYSQL=OFF \
            -DVIX_CORE_WITH_JSON=AUTO \
            -DCMAKE_INSTALL_PREFIX="${PWD}/.ci-install"

      - name: Build installable package
        run: |
          cmake --build build-install -j"${BUILD_JOBS}"

      - name: Install package
        run: |
          cmake --install build-install

      - name: Verify install tree
        run: |
          find .ci-install -maxdepth 8 -type f | sort
          test -d .ci-install/include/vix/p2p_http

  config-coverage:
    name: Configuration Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout p2p_http repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
