      - name: Configure release with middleware auto
        run: |
          cmake -S . -B build-release-mw -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DVIX_ENABLE_SANITIZERS=OFF \
            -DVIX_P2P_HTTP_FETCH_DEPS=ON \
            -DVIX_P2P_HTTP_WITH_MIDDLEWARE=AUTO \
