name: P2P HTTP Strict CI

on:
  push:
    branches: [main, master, dev]
    paths:
      - ".github/workflows/p2p-http-strict-ci.yml"
      - "CMakeLists.txt"
      - "include/**"
      - "src/**"
      - "examples/**"
      - "README.md"
      - "LICENSE"
      - "vix.json"
  pull_request:
    branches: [main, master, dev]
    paths:
      - ".github/workflows/p2p-http-strict-ci.yml"
      - "CMakeLists.txt"
      - "include/**"
      - "src/**"
      - "examples/**"
      - "README.md"
      - "LICENSE"
      - "vix.json"
  workflow_dispatch:

permissions:
  contents: read

env:
  DEPS: >
    build-essential
    cmake
    ninja-build
    clang
    llvm
    lld
    g++
    cppcheck
    clang-tidy
    valgrind
    pkg-config
    git
    libasio-dev
    nlohmann-json3-dev
    libspdlog-dev
    libfmt-dev
    libssl-dev
    libsqlite3-dev
    libmysqlcppconn-dev
  BUILD_JOBS: 2
  VIX_GIT_BRANCH: dev

jobs:
  build-sanitized:
    name: Sanitized Build (${{ matrix.compiler }}, middleware=${{ matrix.middleware }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [clang, gcc]
        middleware: [AUTO, OFF]

    steps:
      - name: Checkout p2p_http repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y $DEPS
          test -f /usr/include/asio.hpp || (echo "::error::System Asio header not found after install"; exit 1)

      - name: Prepare Asio layout for p2p
        run: |
          set -e
          mkdir -p third_party/asio/include
          cp -r /usr/include/asio* third_party/asio/include/ || true
          test -f third_party/asio/include/asio.hpp || (echo "::error::Failed to prepare third_party/asio/include/asio.hpp"; exit 1)

      - name: Fetch sibling dependencies
        run: |
          rm -rf ../core ../p2p ../middleware ../utils ../async ../json ../template ../net ../sync ../cache ../db

          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/core.git ../core
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/p2p.git ../p2p
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/middleware.git ../middleware || true
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/utils.git ../utils
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" --recurse-submodules https://github.com/vixcpp/async.git ../async
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/json.git ../json || true
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/template.git ../template || true
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/net.git ../net
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/sync.git ../sync || true
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/cache.git ../cache || true
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/db.git ../db || true

          git -C ../async submodule update --init --recursive --depth 1 || true

          echo "---- sibling dependencies ----"
          ls -la ../core || true
          ls -la ../p2p || true
          ls -la ../middleware || true
          ls -la ../utils || true
          ls -la ../async || true
          ls -la ../json || true
          ls -la ../template || true
          ls -la ../net || true
          ls -la ../sync || true
          ls -la ../cache || true

      - name: Verify required sibling dependencies
        run: |
          test -f ../core/CMakeLists.txt || (echo "::error::../core/CMakeLists.txt is missing"; exit 1)
          test -f ../p2p/CMakeLists.txt || (echo "::error::../p2p/CMakeLists.txt is missing"; exit 1)
          test -f ../utils/CMakeLists.txt || (echo "::error::../utils/CMakeLists.txt is missing"; exit 1)
          test -f ../async/CMakeLists.txt || (echo "::error::../async/CMakeLists.txt is missing"; exit 1)
          test -f ../net/CMakeLists.txt || (echo "::error::../net/CMakeLists.txt is missing"; exit 1)

      - name: Export dependency include paths
        run: |
          EXTRA_PATHS="$GITHUB_WORKSPACE/../core/include:$GITHUB_WORKSPACE/../p2p/include:$GITHUB_WORKSPACE/../utils/include:$GITHUB_WORKSPACE/../async/include:$GITHUB_WORKSPACE/../net/include"
          if [ -d "$GITHUB_WORKSPACE/../middleware/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../middleware/include"
          fi
          if [ -d "$GITHUB_WORKSPACE/../sync/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../sync/include"
          fi
          if [ -d "$GITHUB_WORKSPACE/../cache/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../cache/include"
          fi
          if [ -d "$GITHUB_WORKSPACE/../json/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../json/include"
          fi
          if [ -d "$GITHUB_WORKSPACE/../template/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../template/include"
          fi
          if [ -d "$GITHUB_WORKSPACE/../db/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../db/include"
          fi
          echo "CPATH=$EXTRA_PATHS${CPATH:+:$CPATH}" >> "$GITHUB_ENV"
          echo "CPLUS_INCLUDE_PATH=$EXTRA_PATHS${CPLUS_INCLUDE_PATH:+:$CPLUS_INCLUDE_PATH}" >> "$GITHUB_ENV"

      - name: Select compiler
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
          else
            echo "CC=gcc" >> "$GITHUB_ENV"
            echo "CXX=g++" >> "$GITHUB_ENV"
          fi

      - name: Configure
        run: |
          cmake -G Ninja -S . -B build-sanitize \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DVIX_ENABLE_SANITIZERS=ON \
            -DVIX_P2P_HTTP_FETCH_DEPS=ON \
            -DVIX_P2P_HTTP_WITH_MIDDLEWARE=${{ matrix.middleware }} \
            -DVIX_P2P_HTTP_BUILD_TESTS=OFF \
            -DVIX_P2P_WITH_UTILS=AUTO \
            -DVIX_P2P_WITH_SYNC=AUTO \
            -DVIX_P2P_WITH_CACHE=AUTO \
            -DVIX_P2P_WITH_JSON=AUTO \
            -DVIX_P2P_WITH_SSL=OFF \
            -DVIX_DB_USE_MYSQL=OFF \
            -DVIX_DB_USE_SQLITE=OFF \
            -DVIX_DB_USE_POSTGRES=OFF \
            -DVIX_DB_USE_REDIS=OFF

      - name: Build
        run: |
          cmake --build build-sanitize -j"${BUILD_JOBS}"

      - name: Print executables
        run: |
          echo "---- executables ----"
          find build-sanitize -type f -executable | sort || true

  runtime-smoke:
    name: Runtime Smoke Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout p2p_http repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y $DEPS
