            -DVIX_MW_WITH_JSON=OFF \
            -DVIX_CORE_WITH_OPENSSL=OFF \
            -DVIX_CORE_WITH_TEMPLATE=AUTO \
            -DVIX_CORE_WITH_MYSQL=OFF \
            -DVIX_CORE_WITH_JSON=AUTO

      - name: Build release with middleware auto
        run: |
          cmake --build build-release-mw -j"${BUILD_JOBS}"

  summary:
    name: P2P HTTP Strict CI Summary
    needs:
      - build
      - static-analysis
      - install-check
      - config-coverage
    runs-on: ubuntu-latest

    steps:
      - name: Print summary
        run: |
          echo "P2P HTTP strict CI completed."
